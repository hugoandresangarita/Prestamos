<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte de Pagos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
  :root { --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#222; --border:#2e2e2e; --accent:#00e5a0; --warn:#ffd166; --text:#e8e8e8; --text2:#888; --mora:#ff4444; --interes:#38bdf8; --capital:#a78bfa; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans',sans-serif; min-height:100vh; transition:background 0.3s,color 0.3s; }
  body.light { --bg:#f5f5f5; --surface:#ffffff; --surface2:#f0f0f0; --border:#e0e0e0; --text:#1a1a1a; --text2:#666; }

  .theme-btn { padding:5px 12px; border-radius:4px; border:1px solid var(--border); background:var(--surface2); color:var(--text2); font-size:11px; font-family:'IBM Plex Mono',monospace; cursor:pointer; transition:all 0.15s; }
  .theme-btn:hover { border-color:var(--accent); color:var(--accent); }
  header { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .logo { font-family:'IBM Plex Mono',monospace; font-size:14px; font-weight:600; color:var(--accent); letter-spacing:2px; text-transform:uppercase; }
  .fecha-hoy { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text2); }
  .stats-bar { display:flex; gap:1px; background:var(--border); border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .stat { flex:1; min-width:100px; background:var(--surface); padding:12px 8px; text-align:center; }
  .stat-num { font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:600; line-height:1; white-space:nowrap; }
  .stat-label { font-size:9px; color:var(--text2); text-transform:uppercase; letter-spacing:1px; margin-top:4px; }
  .stat.cv .stat-num { color:var(--text); font-weight:700; }
  .stat.int .stat-num { color:var(--text); font-weight:700; }
  .stat.cap .stat-num { color:var(--text); font-weight:700; }
  .stat.tot .stat-num { color:var(--text); font-weight:700; }
  .stat.cli .stat-num { color:var(--text); font-weight:700; }
  .stat.nop .stat-num { color:var(--text); font-weight:700; }
  main { max-width:1100px; margin:0 auto; padding:24px 16px; }
  .upload-zone { border:2px dashed var(--border); border-radius:8px; padding:48px; text-align:center; cursor:pointer; transition:all 0.2s; margin-bottom:24px; }
  .upload-zone:hover,.upload-zone.drag-over { border-color:var(--accent); background:rgba(0,229,160,0.04); }
  .upload-icon { font-size:40px; margin-bottom:12px; }
  .upload-title { font-size:16px; font-weight:500; margin-bottom:6px; }
  .upload-sub { font-size:12px; color:var(--text2); }
  #fileInput { display:none; }
  .ctrl { display:none; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
  .ctrl.visible { display:flex; }
  .ml { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:1px; margin-right:4px; }
  .pb { padding:6px 16px; border-radius:4px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px; font-family:'IBM Plex Mono',monospace; cursor:pointer; transition:all 0.15s; min-width:120px; text-align:center; }
  .pb:hover { border-color:var(--accent); }
  .pb.sel { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
  .cb { padding:6px 14px; border-radius:4px; border:1px solid var(--border); background:var(--surface); color:var(--text2); font-size:12px; font-family:'IBM Plex Mono',monospace; cursor:pointer; transition:all 0.15s; }
  .cb:hover { border-color:var(--accent); color:var(--text); }
  .pov { display:none; position:fixed; inset:0; z-index:200; }
  .pov.visible { display:block; }
  .ppn { display:none; position:fixed; z-index:201; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; box-shadow:0 12px 40px rgba(0,0,0,0.5); width:300px; }
  .ppn.visible { display:block; }
  .ph { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .pt { font-family:'IBM Plex Mono',monospace; font-size:15px; font-weight:600; color:var(--text); cursor:pointer; padding:4px 10px; border-radius:4px; transition:all 0.15s; }
  .pt:hover { background:var(--surface2); color:var(--accent); }
  .pn { width:32px; height:32px; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--text2); font-size:12px; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center; }
  .pn:hover { border-color:var(--accent); color:var(--accent); }
  .pg { display:grid; gap:4px; }
  .pg.m { grid-template-columns:repeat(4,1fr); }
  .pg.a { grid-template-columns:repeat(4,1fr); }
  .pg.d { grid-template-columns:repeat(7,1fr); }
  .pc { padding:8px 4px; border-radius:6px; border:1px solid transparent; background:transparent; color:var(--text2); font-size:12px; font-family:'IBM Plex Mono',monospace; cursor:pointer; transition:all 0.15s; text-align:center; }
  .pc:hover { border-color:var(--accent); color:var(--text); background:rgba(0,229,160,0.06); }
  .pc.hoy { border-color:var(--accent); color:var(--accent); }
  .pc.sel { background:var(--accent); color:#000; border-color:var(--accent); font-weight:600; }
  .pc.dh { color:var(--text2); font-size:10px; cursor:default; opacity:0.6; }
  .pc.dh:hover { border-color:transparent; background:transparent; }
  .pc.om { opacity:0.25; }
  .sb { padding:6px 12px; border-radius:4px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:12px; font-family:'IBM Plex Sans',sans-serif; width:220px; outline:none; }
  .sb:focus { border-color:var(--accent); }
  .sb::placeholder { color:var(--text2); }
  .tw { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:16px; }
  .th { display:grid; grid-template-columns:60px 1fr 130px 130px 130px 130px; gap:0; padding:12px 16px; background:var(--surface2); border-bottom:1px solid var(--border); font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:1px; }
  .th span:nth-child(n+3) { text-align:right; }
  .tr { display:grid; grid-template-columns:60px 1fr 130px 130px 130px 130px; gap:0; padding:10px 16px; border-bottom:1px solid var(--border); font-size:13px; transition:background 0.15s; cursor:pointer; }
  .tr:last-child { border-bottom:none; }
  .tr:hover { background:rgba(255,255,255,0.02); }
  .tr .n { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text2); }
  .tr .nm { font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tr .mo { text-align:right; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text2); font-weight:600; }
  .tr .mo.i { color: var(--text2); }
  .tr .mo.c { color: var(--text2); }
  .tr .mo.t { color: var(--text); font-weight:700; }
  .tr .mo.cv { color: var(--text2); }
  .td { display:none; padding:0 16px 12px 76px; background:var(--bg); border-bottom:1px solid var(--border); }
  .td.visible { display:block; }
  .dt { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:1px; padding:10px 0 6px; }
  .df { display:grid; grid-template-columns:120px 1fr; gap:8px; padding:4px 0; font-size:12px; color:var(--text2); }
  .df .f { font-family:'IBM Plex Mono',monospace; }
  .df .v { font-family:'IBM Plex Mono',monospace; }
  .df .v.i { color:var(--interes); }
  .df .v.c { color:var(--capital); }
  .tt { display:grid; grid-template-columns:60px 1fr 130px 130px 130px 130px; gap:0; padding:14px 16px; background:var(--surface2); border-top:2px solid var(--text); font-weight:600; }
  .tt .lb { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text); text-transform:uppercase; letter-spacing:1px; font-weight:700; }
  .tt .mo { text-align:right; font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--text); font-weight:700; }
  .tt .mo.i { color:var(--text); }
  .tt .mo.c { color:var(--text); }
  .tt .mo.t { color:var(--text); }
  .sm { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:16px; }
  .smh { display:flex; align-items:center; gap:8px; padding:12px 16px; background:var(--surface2); border-bottom:1px solid var(--border); cursor:pointer; user-select:none; }
  .smh:hover { background:#282828; }
  .smt { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text2); text-transform:uppercase; letter-spacing:1px; }
  .smc { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--mora); }
  .smtg { font-size:12px; color:var(--text2); transition:transform 0.2s; margin-left:auto; }
  .sm.ab .smtg { transform:rotate(180deg); }
  .smb { display:none; }
  .sm.ab .smb { display:block; }
  .smr { display:grid; grid-template-columns:60px 1fr auto; gap:8px; padding:8px 16px; border-bottom:1px solid var(--border); font-size:13px; align-items:center; }
  .smr:last-child { border-bottom:none; }
  .smr .n { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text2); }
  .smr .nm { color:var(--text); }
  .eb { display:none; gap:8px; margin-top:16px; padding:14px 16px; background:var(--surface); border:1px solid var(--border); border-radius:8px; align-items:center; flex-wrap:wrap; }
  .eb.visible { display:flex; }
  .et { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--accent); text-transform:uppercase; letter-spacing:1px; margin-right:8px; }
  .be { padding:7px 16px; border-radius:5px; border:1px solid var(--accent); background:rgba(0,229,160,0.08); color:var(--accent); font-size:12px; font-family:'IBM Plex Mono',monospace; cursor:pointer; transition:all 0.15s; font-weight:600; }
  .be:hover { background:var(--accent); color:#000; }
  .empty { text-align:center; padding:64px 24px; color:var(--text2); }
  .empty-icon { font-size:48px; margin-bottom:16px; }
  .empty-title { font-size:18px; color:var(--text); margin-bottom:8px; }
  .toast { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--accent); color:var(--accent); padding:12px 20px; border-radius:6px; font-family:'IBM Plex Mono',monospace; font-size:13px; transform:translateY(100px); opacity:0; transition:all 0.3s; z-index:999; pointer-events:none; }
  .toast.show { transform:translateY(0); opacity:1; }
  .pw { height:4px; background:var(--border); border-radius:2px; overflow:hidden; margin-bottom:20px; }
  .pbar { height:100%; background:linear-gradient(90deg,var(--accent),#00b880); border-radius:2px; transition:width 0.4s ease; }
  @media(max-width:700px) { .th,.tr,.tt { grid-template-columns:40px 1fr 70px 70px 70px 70px; font-size:10px; } }
</style>
</head>
<body class="light">
<header><div class="logo">▸ Reporte Pagos</div><button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙 Modo oscuro</button><div class="fecha-hoy" id="fechaHoy"></div></header>
<div class="stats-bar">
  <div class="stat cli"><div class="stat-num" id="s00">0</div><div class="stat-label">Total créditos</div></div>
  <div class="stat cv"><div class="stat-num" id="s0">$0</div><div class="stat-label">Capital vigente</div></div>
  <div class="stat int"><div class="stat-num" id="s1">$0</div><div class="stat-label">Pago intereses</div></div>
  <div class="stat cap"><div class="stat-num" id="s2">$0</div><div class="stat-label">Abono capital</div></div>
  <div class="stat tot"><div class="stat-num" id="s3">$0</div><div class="stat-label">Total interés+capital</div></div>
  <div class="stat cli"><div class="stat-num" id="s4">0</div><div class="stat-label">Clientes pagaron</div></div>
  <div class="stat nop"><div class="stat-num" id="s5">0</div><div class="stat-label">No pagaron</div></div>
</div>
<main>
  <div class="upload-zone" id="uz" onclick="document.getElementById('fi').click()"><div class="upload-icon">📊</div><div class="upload-title">Cargar Excel de créditos</div><div class="upload-sub">Control_Prestamos.xlsx</div><input type="file" id="fi" accept=".xlsx,.xls"></div>
  <div class="pw" id="pw" style="display:none"><div class="pbar" id="pb" style="width:0%"></div></div>
  <div class="ctrl" id="ctrl">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;width:100%">
      <span class="ml">▸ Consultar:</span>
      <label style="font-size:11px;color:var(--text2);font-family:'IBM Plex Mono',monospace">Desde</label>
      <button class="pb" id="bD" onclick="abrirP('d')">01/03/2026</button>
      <label style="font-size:11px;color:var(--text2);font-family:'IBM Plex Mono',monospace">Hasta</label>
      <button class="pb" id="bH" onclick="abrirP('h')">07/03/2026</button>
      <button class="cb" onclick="consultar()" style="background:var(--accent);color:#000;border-color:var(--accent);font-weight:600">Consultar</button>
    </div>
    <div class="pov" id="pov" onclick="cerrarP()"></div>
    <div class="ppn" id="ppn"><div class="ph"><button class="pn" onclick="pNav(-1)">◀</button><span class="pt" id="pTit" onclick="pZoom()">Marzo 2026</span><button class="pn" onclick="pNav(1)">▶</button></div><div class="pg" id="pG"></div></div>
    <div style="display:flex;width:100%;align-items:center;gap:8px;margin-top:4px"><input class="sb" type="text" placeholder="Buscar nombre o # crédito..." id="sB" oninput="render()"></div>
  </div>
  <div id="con"></div>
  <div id="subs"></div>
  <div class="eb" id="eb"><span class="et">▸ Exportar</span><button class="be" onclick="exportXL()">📥 Exportar en Excel</button><button class="be" onclick="exportPDF()" style="border-color:var(--warn);color:var(--warn);background:rgba(255,209,102,0.08)">📄 Exportar en PDF</button></div>
</main>
<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const HOY=new Date();HOY.setHours(0,0,0,0);
document.getElementById('fechaHoy').textContent=HOY.toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
let datos=[],omitidos=[],capVig=0,totalCred=0;
const EV=['mora','ya casi mes','al dia'];
const $=id=>document.getElementById(id);
const COP=n=>new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(n);
const uz=$('uz'),fi=$('fi');
uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('drag-over')});
uz.addEventListener('dragleave',()=>uz.classList.remove('drag-over'));
uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('drag-over');proc(e.dataTransfer.files[0])});
fi.addEventListener('change',e=>proc(e.target.files[0]));
function pD(v){if(!v&&v!==0)return null;if(v instanceof Date&&!isNaN(v.getTime())){const d=new Date(v);d.setHours(0,0,0,0);return d}if(typeof v==='number'&&isFinite(v)){const ms=Math.round((v-25569)*864e5);const d=new Date(ms);if(!isNaN(d.getTime())){d.setHours(0,0,0,0);return d}}const s=String(v).trim();if(!s||s==='-'||/varias|pendiente|no paga|ya casi/i.test(s))return null;const d1=new Date(s);if(!isNaN(d1.getTime())){d1.setHours(0,0,0,0);return d1}return null}
function pM(v){if(v==null)return 0;if(typeof v==='number')return isFinite(v)?v:0;let s=String(v).trim().replace(/[^\d.,-]/g,'');if(!s)return 0;s=s.replace(/,/g,'');return isFinite(parseFloat(s))?parseFloat(s):0}
function proc(file){
  if(!file)return;$('pw').style.display='block';$('pb').style.width='20%';
  const r=new FileReader();
  r.onload=e=>{
    try{
      $('pb').style.width='50%';
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:true,password:'5810801'});
      const wv=wb.Sheets['Vigentes'];if(!wv){toast('❌ No se encontró "Vigentes"');return}
      const vd=XLSX.utils.sheet_to_json(wv,{header:1,defval:'',raw:true});
      const ci={};capVig=0;omitidos=[];totalCred=0;
      for(let i=7;i<vd.length;i++){
        const row=vd[i],num=row[0];if(!num||isNaN(Number(num)))continue;
        totalCred++;
        const nm=String(row[9]||'').trim(),ep=String(row[3]||'').trim(),epN=ep.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''),cap=pM(row[15]),tel=String(row[25]||'').trim();
        if(!EV.includes(epN)){omitidos.push({numero:Number(num),nombre:nm,estado:ep,capital:cap});continue}
        capVig+=cap;ci[String(num)]={nombre:nm,telefono:tel,capital:cap};
      }
      $('pb').style.width='60%';datos=[];
      for(const name of wb.SheetNames){
        if(isNaN(Number(name))||!ci[name])continue;
        const ws=wb.Sheets[name],filas=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:true,dateNF:'yyyy-mm-dd'}),info=ci[name],pagos=[];
        for(let j=8;j<filas.length;j++){
          const f=filas[j];if(!f)continue;
          // Saltar filas sin número o con texto en col 0
          const col0=f[0];if(col0===''||col0===null||col0===undefined)continue;
          if(typeof col0==='string'&&isNaN(Number(col0)))continue;
          const fH=pD(f[2]),fiR=f[5],pi=pM(f[6]),fcR=f[7],ac=pM(f[8]);
          let fI=pD(fiR);const fIS=String(fiR||'').trim().toLowerCase();if(!fI&&fIS==='varias'&&fH)fI=fH;
          let fC=pD(fcR);const fCS=String(fcR||'').trim().toLowerCase();if(!fC&&fCS==='varias'&&fH)fC=fH;
          if((fI&&pi>0)||(fC&&ac>0)){pagos.push({fI,pi:pi>0?pi:0,fC,ac:ac>0?ac:0,v:fIS==='varias'||fCS==='varias'})}
        }
        datos.push({num:Number(name),nm:info.nombre,tel:info.telefono,cv:info.capital,pagos});
      }
      $('pb').style.width='90%';
      const mH=HOY.getMonth()+1,aH=HOY.getFullYear(),dM=new Date(aH,mH,0).getDate();
      pdV={y:aH,m:mH,d:1};phV={y:aH,m:mH,d:dM};
      rD=`${aH}-${String(mH).padStart(2,'0')}`;rH=rD;activo=true;initP();
      $('pb').style.width='100%';
      setTimeout(()=>{$('pw').style.display='none';uz.style.display='none';$('ctrl').classList.add('visible');$('eb').classList.add('visible');render();toast(`✅ ${datos.length} créditos cargados`)},400);
    }catch(err){toast('❌ '+err.message);console.error(err)}
  };r.readAsArrayBuffer(file);
}
// Picker
let pTgt=null,pVis='d',pA=HOY.getFullYear(),pMe=HOY.getMonth()+1;
let pdV={y:HOY.getFullYear(),m:1,d:1},phV={y:HOY.getFullYear(),m:HOY.getMonth()+1,d:HOY.getDate()};
let activo=false,rD=null,rH=null;
const MC=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const ML=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DS=['Do','Lu','Ma','Mi','Ju','Vi','Sa'];
function initP(){$('bD').textContent=fP(pdV);$('bH').textContent=fP(phV)}
function fP(v){return`${String(v.d).padStart(2,'0')}/${String(v.m).padStart(2,'0')}/${v.y}`}
function abrirP(t){
  pTgt=t;const v=t==='d'?pdV:phV;pA=v.y;pMe=v.m;pVis='d';
  const btn=$(t==='d'?'bD':'bH'),rect=btn.getBoundingClientRect(),pnl=$('ppn');
  pnl.style.left=Math.min(rect.left,innerWidth-320)+'px';pnl.style.top=(rect.bottom+8)+'px';
  $('bD').classList.remove('sel');$('bH').classList.remove('sel');btn.classList.add('sel');
  $('pov').classList.add('visible');pnl.classList.add('visible');rP();
}
function cerrarP(){$('pov').classList.remove('visible');$('ppn').classList.remove('visible');$('bD').classList.remove('sel');$('bH').classList.remove('sel')}
function pNav(dir){if(pVis==='d'){pMe+=dir;if(pMe>12){pMe=1;pA++}if(pMe<1){pMe=12;pA--}}else if(pVis==='m')pA+=dir;else pA+=dir*20;rP()}
function pZoom(){if(pVis==='d')pVis='m';else if(pVis==='m')pVis='a';rP()}
function rP(){if(pVis==='d')rDias();else if(pVis==='m')rMes();else rAn()}
function rDias(){
  $('pTit').textContent=`${ML[pMe-1]} ${pA}`;const g=$('pG');g.className='pg d';
  const s=pTgt==='d'?pdV:phV,p=new Date(pA,pMe-1,1).getDay(),dm=new Date(pA,pMe,0).getDate(),dp=new Date(pA,pMe-1,0).getDate();
  let h=DS.map(d=>`<span class="pc dh">${d}</span>`).join('');
  for(let i=p-1;i>=0;i--)h+=`<span class="pc om">${dp-i}</span>`;
  for(let d=1;d<=dm;d++){const ey=pA===HOY.getFullYear()&&pMe===HOY.getMonth()+1&&d===HOY.getDate(),es=pA===s.y&&pMe===s.m&&d===s.d;h+=`<button class="pc${es?' sel':ey?' hoy':''}" onclick="sD(${d})">${d}</button>`}
  const r=(p+dm)%7;if(r)for(let i=1;i<=7-r;i++)h+=`<span class="pc om">${i}</span>`;
  g.innerHTML=h;
}
function rMes(){
  $('pTit').textContent=`${pA}`;const g=$('pG');g.className='pg m';const s=pTgt==='d'?pdV:phV;
  g.innerHTML=MC.map((n,i)=>{const m=i+1,ey=pA===HOY.getFullYear()&&m===HOY.getMonth()+1,es=pA===s.y&&m===s.m;return`<button class="pc${es?' sel':ey?' hoy':''}" onclick="sM(${m})">${n}</button>`}).join('');
}
function rAn(){
  const b=Math.floor(pA/20)*20;$('pTit').textContent=`${b} — ${b+19}`;const g=$('pG');g.className='pg a';const s=pTgt==='d'?pdV:phV;
  let h='';for(let y=b;y<b+20;y++){const es=y===s.y,ey=y===HOY.getFullYear();h+=`<button class="pc${es?' sel':ey?' hoy':''}" onclick="sA(${y})">${y}</button>`}g.innerHTML=h;
}
function sA(y){pA=y;pVis='m';rP()}
function sM(m){pMe=m;pVis='d';rP()}
function sD(d){const v={y:pA,m:pMe,d};if(pTgt==='d'){pdV=v;$('bD').textContent=fP(v)}else{phV=v;$('bH').textContent=fP(v)}cerrarP()}
function consultar(){
  const d=`${pdV.y}-${String(pdV.m).padStart(2,'0')}`,h=`${phV.y}-${String(phV.m).padStart(2,'0')}`;
  if(d>h){toast('❌ "Desde" debe ser anterior');return}
  activo=true;rD=d;rH=h;render();toast(`📊 ${fP(pdV)} → ${fP(phV)}`);
}
function getPR(c,d,h){
  const[yD,mD]=d.split('-').map(Number),[yH,mH]=h.split('-').map(Number);
  const pi=[],pc=[];
  function ok(f){const v=f.getFullYear()*100+f.getMonth()+1;return v>=yD*100+mD&&v<=yH*100+mH}
  for(const p of c.pagos){
    if(p.fI&&p.pi>0&&ok(p.fI))pi.push({fecha:p.fI,monto:p.pi,v:p.v});
    if(p.fC&&p.ac>0&&ok(p.fC))pc.push({fecha:p.fC,monto:p.ac,v:p.v});
  }
  return{pi,pc};
}
function render(){
  if(!activo)return;const con=$('con'),bq=($('sB')?.value||'').toLowerCase().trim();
  let lista=[],sinA=[];
  for(const c of datos){
    const{pi,pc}=getPR(c,rD,rH);const tI=pi.reduce((s,p)=>s+p.monto,0),tC=pc.reduce((s,p)=>s+p.monto,0);
    if(tI===0&&tC===0){sinA.push(c);continue}
    lista.push({...c,pi,pc,tI,tC,tP:tI+tC});
  }
  if(bq){lista=lista.filter(c=>c.nm.toLowerCase().includes(bq)||String(c.num).includes(bq));sinA=sinA.filter(c=>c.nm.toLowerCase().includes(bq)||String(c.num).includes(bq))}
  lista.sort((a,b)=>b.tP-a.tP);
  const sI=lista.reduce((s,c)=>s+c.tI,0),sC=lista.reduce((s,c)=>s+c.tC,0),sT=sI+sC;
  const nC=new Set(lista.map(c=>c.nm.toUpperCase().trim())).size;
  const nN=new Set(sinA.map(c=>c.nm.toUpperCase().trim())).size;
  $('s00').textContent=totalCred;$('s0').textContent=COP(capVig);$('s1').textContent=COP(sI);$('s2').textContent=COP(sC);$('s3').textContent=COP(sT);$('s4').textContent=nC;$('s5').textContent=nN;
  if(!lista.length){con.innerHTML='<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">Sin pagos en este periodo</div></div>'}
  else{
    const fF=d=>d.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric'});
    let h=`<div class="sm ab" id="smPagaron"><div class="smh" onclick="this.parentElement.classList.toggle('ab')"><span class="smt">Clientes con abono capital o interés</span><span class="smc" style="color:var(--accent)">(${lista.length})</span><span class="smtg">▼</span></div><div class="smb">`;
    h+='<div class="tw" style="border-radius:0;border:none"><div class="th"><span>#</span><span>Cliente</span><span>Capital vig.</span><span>Pago interés</span><span>Abono capital</span><span>Total</span></div>';
    for(const c of lista){
      const id=`d${c.num}`;
      h+=`<div class="tr" onclick="tD('${id}')"><span class="n">${c.num}</span><span class="nm">${c.nm}</span><span class="mo cv">${COP(c.cv)}</span><span class="mo i">${COP(c.tI)}</span><span class="mo c">${c.tC>0?COP(c.tC):'—'}</span><span class="mo t">${COP(c.tP)}</span></div>`;
      h+=`<div class="td" id="${id}">`;
      if(c.pi.length){h+=`<div class="dt">Pagos de interés</div>`;for(const p of c.pi)h+=`<div class="df"><span class="f">${p.v?'~'+fF(p.fecha)+' (Varias)':fF(p.fecha)}</span><span class="v i">${COP(p.monto)}</span></div>`}
      if(c.pc.length){h+=`<div class="dt">Abonos a capital</div>`;for(const p of c.pc)h+=`<div class="df"><span class="f">${p.v?'~'+fF(p.fecha)+' (Varias)':fF(p.fecha)}</span><span class="v c">${COP(p.monto)}</span></div>`}
      h+='</div>';
    }
    const sumCV=lista.reduce((s,c)=>s+c.cv,0);
    h+=`<div class="tt"><span></span><span class="lb">Total (${lista.length} clientes)</span><span class="mo">${COP(sumCV)}</span><span class="mo i">${COP(sI)}</span><span class="mo c">${COP(sC)}</span><span class="mo t">${COP(sT)}</span></div></div>`;
    h+='</div></div>';
    con.innerHTML=h;
  }
  let sh='';
  if(sinA.length){
    const sumCVsinA=sinA.reduce((s,c)=>s+c.cv,0);
    sh+=`<div class="sm" id="smSA"><div class="smh" onclick="this.parentElement.classList.toggle('ab')"><span class="smt">Clientes sin abonos a capital ni interés</span><span class="smc">(${sinA.length})</span><span class="smtg">▼</span></div><div class="smb">`;
    sh+=`<div class="smr" style="background:var(--surface2);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px"><span class="n">#</span><span class="nm">Cliente</span><span style="text-align:right;min-width:130px">Capital vig.</span></div>`;
    for(const c of sinA)sh+=`<div class="smr"><span class="n">${c.num}</span><span class="nm">${c.nm}</span><span style="text-align:right;min-width:130px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text2)">${COP(c.cv)}</span></div>`;
    sh+=`<div style="display:flex;justify-content:space-between;padding:10px 16px;background:var(--surface2);border-top:2px solid var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700"><span style="color:var(--text);text-transform:uppercase;letter-spacing:1px">Total: ${sinA.length} clientes</span><span style="color:var(--text)">Capital vigente: ${COP(sumCVsinA)}</span></div>`;
    sh+='</div></div>';
  }
  if(omitidos.length){
    const sumCVomit=omitidos.reduce((s,c)=>s+(c.capital||0),0);
    sh+=`<div class="sm" id="smOm"><div class="smh" onclick="this.parentElement.classList.toggle('ab')"><span class="smt">Clientes omitidos del reporte</span><span class="smc">(${omitidos.length})</span><span class="smtg">▼</span></div><div class="smb">`;
    sh+=`<div class="smr" style="background:var(--surface2);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px"><span class="n">#</span><span class="nm">Cliente</span><span style="text-align:right;min-width:130px">Capital vig.</span></div>`;
    for(const c of omitidos)sh+=`<div class="smr"><span class="n">${c.numero}</span><span class="nm">${c.nombre} <span style="color:var(--text2);font-size:11px">— ${c.estado}</span></span><span style="text-align:right;min-width:130px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text2)">${COP(c.capital||0)}</span></div>`;
    sh+=`<div style="display:flex;justify-content:space-between;padding:10px 16px;background:var(--surface2);border-top:2px solid var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700"><span style="color:var(--text);text-transform:uppercase;letter-spacing:1px">Total: ${omitidos.length} clientes omitidos</span><span style="color:var(--text)">Capital vigente: ${COP(sumCVomit)}</span></div>`;
    sh+='</div></div>';
  }
  $('subs').innerHTML=sh;
}
function tD(id){$(id).classList.toggle('visible')}
function exportXL(){

    const lista=[];
    for(const c of datos){
      const{pi,pc}=getPR(c,rD,rH);if(!pi.length&&!pc.length)continue;
      const tI=pi.reduce((s,p)=>s+p.monto,0),tC=pc.reduce((s,p)=>s+p.monto,0);
      lista.push({

        'Abono capital':tC,
        'Fechas abono':pc.map(p=>p.fecha.toLocaleDateString('es-CO')).join(', '),
        'Total pagado':tI+tC
      });
    }
    if(!lista.length){toast('❌ No hay datos para exportar');return}
    lista.sort((a,b)=>b['Total pagado']-a['Total pagado']);

    const hoja=`${fP(pdV)} a ${fP(phV)}`.replace(/\//g,'-').substring(0,31);
    XLSX.utils.book_append_sheet(wb,ws,hoja);
    // Hoja sin abonos
    const sinA=datos.filter(c=>{const{pi,pc}=getPR(c,rD,rH);return!pi.length&&!pc.length}).map(c=>({'# Crédito':c.num,'Cliente':c.nm,'Capital vigente':c.cv}));

    // Hoja omitidos

    XLSX.writeFile(wb,`reporte_pagos_${rD}_a_${rH}.xlsx`);
    toast(`📥 Exportado: ${lista.length} registros`);

  }
}
